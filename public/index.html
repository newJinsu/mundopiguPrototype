<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문도 피구 - 온라인 멀티플레이</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            display: flex;
            height: 100vh;
        }

        #sidebar {
            width: 350px;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
            overflow-y: auto;
            border-right: 2px solid #1a252f;
            z-index: 10;
        }

        #game-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #111;
            overflow: hidden;
        }

        canvas {
            display: block;
            background-color: #1a1a1a;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        #ui {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        h2 {
            margin: 0 0 10px 0;
            color: #f1c40f;
        }

        p {
            margin: 5px 0;
            font-size: 14px;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            border: 2px solid #fff;
            z-index: 20;
            pointer-events: auto;
        }

        #game-over h1 {
            margin: 0 0 20px 0;
            font-size: 48px;
        }

        #game-over p {
            font-size: 20px;
            color: #ccc;
        }

        #restart-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }

        #restart-btn:hover {
            background-color: #2980b9;
        }

        #connection-status {
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        #settings-panel {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #555;
            display: none;
            flex-direction: column;
            margin-bottom: 20px;
        }

        #settings-panel h3 {
            margin-top: 0;
            color: #f1c40f;
            margin-bottom: 10px;
        }

        .setting-row {
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .setting-row label {
            font-size: 13px;
            color: #ccc;
            margin-right: 15px;
        }

        .setting-row input {
            width: 70px;
            text-align: right;
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 2px 5px;
            border-radius: 3px;
        }

        #hp-container {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .hp-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #555;
            display: none;
        }

        .hp-box h4 {
            margin: 0 0 5px 0;
            font-size: 14px;
        }

        .hp-bar-bg {
            width: 100%;
            height: 20px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #fff;
            position: relative;
        }

        .hp-bar-fill {
            height: 100%;
            transition: width 0.1s linear;
        }

        .hp-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }

        #settings-toggle {
            padding: 10px;
            background-color: #34495e;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            width: 100%;
        }

        #settings-toggle:hover {
            background-color: #2c3e50;
        }

        #apply-settings {
            width: 100%;
            margin-top: 15px;
            padding: 8px;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #apply-settings:hover {
            background-color: #d35400;
        }
    </style>
</head>

<body>
    <div id="sidebar">
        <div id="connection-status" style="color: #f39c12;">서버 연결 중...</div>

        <div id="hp-container">
            <div class="hp-box" id="p1-hp-box">
                <h4 style="color: #3498db;">Player 1 (🔵)</h4>
                <div class="hp-bar-bg">
                    <div id="p1-hp-fill" class="hp-bar-fill" style="background-color: #3498db; width: 100%;"></div>
                    <div id="p1-hp-text" class="hp-text">100 / 100</div>
                </div>
            </div>
            <div class="hp-box" id="p2-hp-box">
                <h4 style="color: #e74c3c;">Player 2 (🔴)</h4>
                <div class="hp-bar-bg">
                    <div id="p2-hp-fill" class="hp-bar-fill" style="background-color: #e74c3c; width: 100%;"></div>
                    <div id="p2-hp-text" class="hp-text">100 / 100</div>
                </div>
            </div>
        </div>

        <div id="ui">
            <h2>문도 피구 (Online)</h2>
            <div>
                <h3 id="role-text" style="color: #3498db; margin: 0 0 5px 0;"></h3>
                <p>이동: W, A, S, D</p>
                <p>대쉬: Shift 또는 Space</p>
                <p>공격: 마우스 왼쪽 클릭 & 드래그 (조준)</p>
                <p>차징: 클릭 유지 시 기모음</p>
                <p>반사: 마우스 우클릭</p>
            </div>
        </div>

        <button id="settings-toggle">설정 패널 열기/닫기 ⚙️</button>
        <div id="settings-panel" style="display: none; flex-direction: column;">
            <h3>게임 설정</h3>
            <div class="setting-row"><label>게임판 가로</label><input type="number" id="set-boardWidth" step="50"></div>
            <div class="setting-row"><label>게임판 세로</label><input type="number" id="set-boardHeight" step="50"></div>
            <div class="setting-row"><label>캐릭터 크기</label><input type="number" id="set-radius" step="1"></div>
            <div class="setting-row"><label>이동속도</label><input type="number" id="set-baseSpeed" step="10"></div>
            <div class="setting-row"><label>미사일 속도</label><input type="number" id="set-missileSpeed" step="10"></div>
            <div class="setting-row"><label>차지 미사일 속도</label><input type="number" id="set-superMissileSpeed" step="10">
            </div>
            <div class="setting-row"><label>반사 미사일 속도</label><input type="number" id="set-reflectedMissileSpeed"
                    step="10">
            </div>
            <div class="setting-row"><label>최소 차지 시간(초)</label><input type="number" id="set-minChargeTime" step="0.05">
            </div>
            <div class="setting-row"><label>최대 차지 시간(초)</label><input type="number" id="set-maxChargeTime" step="0.1">
            </div>
            <div class="setting-row"><label>차지 중 이속 비율</label><input type="number" id="set-chargeMult" step="0.1"></div>
            <div class="setting-row"><label>대쉬 거리</label><input type="number" id="set-dashDistance" step="10"></div>
            <div class="setting-row"><label>대쉬 쿨다운(초)</label><input type="number" id="set-dashCooldown" step="0.1">
            </div>
            <div class="setting-row"><label>반사 쿨다운(초)</label><input type="number" id="set-reflectCooldown" step="0.1">
            </div>
            <div class="setting-row"><label>공격 쿨다운(초)</label><input type="number" id="set-attackCooldown" step="0.1">
            </div>
            <div class="setting-row"><label>최대 체력</label><input type="number" id="set-maxHP" step="10"></div>
            <div class="setting-row"><label>일반 데미지</label><input type="number" id="set-missileDamage" step="5"></div>
            <div class="setting-row"><label>차지 데미지</label><input type="number" id="set-superMissileDamage" step="5">
            </div>
            <div class="setting-row"><label>일반 미사일 크기</label><input type="number" id="set-missileRadius" step="1"></div>
            <div class="setting-row"><label>차지 미사일 크기</label><input type="number" id="set-superMissileRadius" step="1">
            </div>
            <button id="apply-settings">서버에 적용하기</button>
        </div>
    </div>

    <div id="game-container">
        <div id="game-over">
            <h1 id="winner-text">승리!</h1>
            <p>게임 종료</p>
            <button id="restart-btn">재시작 (R)</button>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameOverUI = document.getElementById('game-over');
        const winnerText = document.getElementById('winner-text');
        const statusText = document.getElementById('connection-status');
        const roleText = document.getElementById('role-text');
        const gameContainer = document.getElementById('game-container');

        let ws;
        let myRole = "";
        let serverWidth = 1600;
        let serverHeight = 900;

        let gameState = { players: {}, projectiles: [], gameOver: false };
        let globalConfig = {}; // Added globalConfig for minChargeTime reference

        const inputState = {
            up: false, down: false, left: false, right: false,
            dash: false, isAttack: false, reflect: false, mouseX: 0, mouseY: 0
        };

        function connect() {
            const loc = window.location;
            let wsUri = loc.protocol === "https:" ? "wss:" : "ws:";
            wsUri += "//" + loc.host + "/ws";

            ws = new WebSocket(wsUri);

            ws.onopen = () => {
                statusText.innerText = "서버 연결 됨!";
                statusText.style.color = "#2ecc71";
            };

            ws.onmessage = (e) => {
                try {
                    const msg = JSON.parse(e.data);
                    if (msg.type === "init") {
                        myRole = msg.role;
                        serverWidth = msg.width;
                        serverHeight = msg.height;
                        resize();

                        if (myRole === "p1") {
                            roleText.innerText = "🔵 당신은 Player 1 (Left)";
                            roleText.style.color = "#3498db";
                        } else if (myRole === "p2") {
                            roleText.innerText = "🔴 당신은 Player 2 (Right 반전)";
                            roleText.style.color = "#e74c3c";
                        } else {
                            roleText.innerText = "👀 관전자 모드";
                            roleText.style.color = "#95a5a6";
                        }

                        if (msg.settings) {
                            globalConfig = msg.settings; // Store settings globally
                            document.getElementById('set-boardWidth').value = msg.settings.boardWidth || 1600;
                            document.getElementById('set-boardHeight').value = msg.settings.boardHeight || 900;
                            document.getElementById('set-radius').value = msg.settings.playerRadius;
                            document.getElementById('set-baseSpeed').value = msg.settings.baseSpeed;
                            document.getElementById('set-missileSpeed').value = msg.settings.missileSpeed;
                            document.getElementById('set-superMissileSpeed').value = msg.settings.superMissileSpeed;
                            document.getElementById('set-reflectedMissileSpeed').value = msg.settings.reflectedMissileSpeed || 3000;
                            document.getElementById('set-minChargeTime').value = msg.settings.minChargeTime || 0.15;
                            document.getElementById('set-maxChargeTime').value = msg.settings.maxChargeTime;
                            document.getElementById('set-chargeMult').value = msg.settings.chargeSpeedMult;
                            document.getElementById('set-dashDistance').value = msg.settings.dashDistance;
                            document.getElementById('set-dashCooldown').value = msg.settings.dashCooldownLimit;
                            document.getElementById('set-reflectCooldown').value = msg.settings.reflectCooldownLimit;
                            document.getElementById('set-attackCooldown').value = msg.settings.attackCooldownLimit;
                            document.getElementById('set-maxHP').value = msg.settings.maxHP || 100;
                            document.getElementById('set-missileDamage').value = msg.settings.missileDamage || 15;
                            document.getElementById('set-superMissileDamage').value = msg.settings.superMissileDamage || 35;
                            document.getElementById('set-missileRadius').value = msg.settings.missileRadius || 12;
                            document.getElementById('set-superMissileRadius').value = msg.settings.superMissileRadius || 18;
                        }
                    } else if (msg.type === "state") {
                        gameState = msg.state;

                        if (msg.settings) {
                            globalConfig = msg.settings; // Update globalConfig with latest settings
                            if (serverWidth !== msg.settings.boardWidth || serverHeight !== msg.settings.boardHeight) {
                                serverWidth = msg.settings.boardWidth || 1600;
                                serverHeight = msg.settings.boardHeight || 900;
                                resize();
                            }
                        }

                        const p1 = gameState.players["p1"];
                        if (p1) {
                            document.getElementById('p1-hp-box').style.display = 'block';
                            const p1MaxHp = p1.maxHP || 100;
                            const p1Percent = Math.max(0, (p1.hp / p1MaxHp) * 100);
                            document.getElementById('p1-hp-fill').style.width = `${p1Percent}%`;
                            document.getElementById('p1-hp-text').innerText = `${p1.hp} / ${p1MaxHp}`;
                        } else {
                            document.getElementById('p1-hp-box').style.display = 'none';
                        }

                        const p2 = gameState.players["p2"];
                        if (p2) {
                            document.getElementById('p2-hp-box').style.display = 'block';
                            const p2MaxHp = p2.maxHP || 100;
                            const p2Percent = Math.max(0, (p2.hp / p2MaxHp) * 100);
                            document.getElementById('p2-hp-fill').style.width = `${p2Percent}%`;
                            document.getElementById('p2-hp-text').innerText = `${p2.hp} / ${p2MaxHp}`;
                        } else {
                            document.getElementById('p2-hp-box').style.display = 'none';
                        }

                        if (gameState.gameOver) {
                            gameOverUI.style.display = 'block';
                            winnerText.innerText = gameState.winner;
                        } else {
                            gameOverUI.style.display = 'none';
                        }
                    }
                } catch (err) { }
            };

            ws.onclose = () => {
                statusText.innerText = "서버 연결 끊김";
                statusText.style.color = "#e74c3c";
                setTimeout(connect, 3000);
            };
        }

        window.addEventListener('keydown', e => {
            if (e.code === 'KeyW') inputState.up = true;
            if (e.code === 'KeyS') inputState.down = true;
            if (e.code === 'KeyA') inputState.left = true;
            if (e.code === 'KeyD') inputState.right = true;
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight' || e.code === 'Space') inputState.dash = true;

            if (e.code === 'KeyR' && gameState.gameOver) {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: "restart" }));
                }
            }
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "restart" }));
            }
        });

        window.addEventListener('keyup', e => {
            if (e.code === 'KeyW') inputState.up = false;
            if (e.code === 'KeyS') inputState.down = false;
            if (e.code === 'KeyA') inputState.left = false;
            if (e.code === 'KeyD') inputState.right = false;
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight' || e.code === 'Space') inputState.dash = false;
        });

        const settingsToggle = document.getElementById('settings-toggle');
        if (settingsToggle) {
            settingsToggle.addEventListener('click', () => {
                const panel = document.getElementById('settings-panel');
                if (panel) {
                    panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
                }
            });
        }

        const applySettingsBtn = document.getElementById('apply-settings');
        if (applySettingsBtn) {
            applySettingsBtn.addEventListener('click', () => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    const settings = {
                        boardWidth: parseFloat(document.getElementById('set-boardWidth').value),
                        boardHeight: parseFloat(document.getElementById('set-boardHeight').value),
                        playerRadius: parseFloat(document.getElementById('set-radius').value),
                        baseSpeed: parseFloat(document.getElementById('set-baseSpeed').value),
                        missileSpeed: parseFloat(document.getElementById('set-missileSpeed').value),
                        superMissileSpeed: parseFloat(document.getElementById('set-superMissileSpeed').value),
                        reflectedMissileSpeed: parseFloat(document.getElementById('set-reflectedMissileSpeed').value),
                        minChargeTime: parseFloat(document.getElementById('set-minChargeTime').value),
                        maxChargeTime: parseFloat(document.getElementById('set-maxChargeTime').value),
                        chargeSpeedMult: parseFloat(document.getElementById('set-chargeMult').value),
                        dashDistance: parseFloat(document.getElementById('set-dashDistance').value),
                        dashCooldownLimit: parseFloat(document.getElementById('set-dashCooldown').value),
                        reflectCooldownLimit: parseFloat(document.getElementById('set-reflectCooldown').value),
                        attackCooldownLimit: parseFloat(document.getElementById('set-attackCooldown').value),
                        maxHP: parseInt(document.getElementById('set-maxHP').value) || 100,
                        missileDamage: parseInt(document.getElementById('set-missileDamage').value) || 15,
                        superMissileDamage: parseInt(document.getElementById('set-superMissileDamage').value) || 35,
                        missileRadius: parseFloat(document.getElementById('set-missileRadius').value) || 12,
                        superMissileRadius: parseFloat(document.getElementById('set-superMissileRadius').value) || 18
                    };
                    ws.send(JSON.stringify({ type: "update_settings", settings: settings }));
                }
            });

            window.addEventListener('contextmenu', e => e.preventDefault());
            window.addEventListener('mousedown', e => {
                if (e.button === 0) inputState.isAttack = true;
                if (e.button === 2) inputState.reflect = true;
            });
            window.addEventListener('mouseup', e => {
                if (e.button === 0) inputState.isAttack = false;
                if (e.button === 2) inputState.reflect = false;
            });
        }

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            let rawX = e.clientX - rect.left;
            let rawY = e.clientY - rect.top;

            let sX = rawX * (canvas.width / rect.width);
            let sY = rawY * (canvas.height / rect.height);

            if (myRole === "p2") {
                sX = serverWidth - sX;
                sY = serverHeight - sY;
            }

            inputState.mouseX = sX;
            inputState.mouseY = sY;
        });

        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN && myRole !== "spectator") {
                let payload = { type: "input", ...inputState };
                if (myRole === "p2") {
                    payload.up = inputState.down;
                    payload.down = inputState.up;
                    payload.left = inputState.right;
                    payload.right = inputState.left;
                }
                ws.send(JSON.stringify(payload));
            }
        }, 16);

        function resize() {
            canvas.width = serverWidth;
            canvas.height = serverHeight;

            const containerWidth = gameContainer.clientWidth;
            const containerHeight = gameContainer.clientHeight;

            const targetRatio = serverWidth / serverHeight;
            const containerRatio = containerWidth / containerHeight;

            let displayWidth, displayHeight;
            if (containerRatio > targetRatio) {
                displayHeight = containerHeight * 0.95;
                displayWidth = displayHeight * targetRatio;
            } else {
                displayWidth = containerWidth * 0.95;
                displayHeight = displayWidth / targetRatio;
            }

            canvas.style.width = displayWidth + 'px';
            canvas.style.height = displayHeight + 'px';
        }

        window.addEventListener('resize', resize);
        resize();

        // drawHPBar HTML로 이관됨

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState.gameOver) {
                // Return early if the game is over to prevent freeze/crashes from input logic missing components
                requestAnimationFrame(draw);
                return;
            }

            ctx.save();

            if (myRole === "p2") {
                ctx.translate(serverWidth / 2, serverHeight / 2);
                ctx.rotate(Math.PI);
                ctx.translate(-serverWidth / 2, -serverHeight / 2);
            }

            ctx.beginPath();
            ctx.moveTo(serverWidth / 2, 0);
            ctx.lineTo(serverWidth / 2, serverHeight);
            ctx.setLineDash([15, 15]);
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.setLineDash([]);

            for (let id in gameState.players) {
                let p = gameState.players[id];

                if (p.isCharging) {
                    ctx.beginPath();
                    const startAngle = -Math.PI / 2;
                    let chargeRatio = 0;

                    const minCharge = globalConfig ? globalConfig.minChargeTime : 0.15;
                    chargeRatio = Math.min(1.0, p.chargeTime / p.maxChargeTime);

                    let ringColor = 'rgba(231, 76, 60, 0.7)'; // Red (Under min charge)
                    if (p.chargeTime >= p.maxChargeTime) {
                        ringColor = '#f1c40f'; // Yellow (Max charged)
                    } else if (p.chargeTime >= minCharge) {
                        ringColor = 'white';   // White (Ready to fire)
                    }

                    const endAngle = startAngle + chargeRatio * Math.PI * 2;
                    ctx.arc(p.x, p.y, p.radius + 8, startAngle, endAngle);
                    ctx.strokeStyle = ringColor;
                    ctx.lineWidth = 4;
                    ctx.stroke();
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;

                if (p.isDashing) {
                    ctx.globalAlpha = 0.5;
                    ctx.beginPath();
                    ctx.arc(p.x - p.dashDir.x * 20, p.y - p.dashDir.y * 20, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = 0.2;
                    ctx.fill();
                }
                ctx.fill();
                ctx.globalAlpha = 1.0;

                if (p.isReflecting) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius + 10, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(46, 204, 113, 0.4)';
                    ctx.fill();
                    ctx.strokeStyle = '#2ecc71';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }

                if (p.hasDamageBuff) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius + 15, 0, Math.PI * 2);
                    ctx.strokeStyle = '#e74c3c';
                    ctx.lineWidth = 4;
                    ctx.setLineDash([8, 6]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                ctx.lineWidth = 2;
                ctx.strokeStyle = '#fff';
                ctx.stroke();

                if (id === myRole) {
                    ctx.save();
                    if (myRole === "p2") {
                        ctx.translate(p.x, p.y + p.radius + 30);
                        ctx.rotate(Math.PI);
                        ctx.translate(-p.x, -(p.y + p.radius + 30));
                    }
                    ctx.fillStyle = '#ccc';
                    ctx.font = 'bold 12px Tahoma';
                    ctx.textAlign = 'center';

                    let texts = [];
                    if (p.attackCooldown > 0) texts.push(`Attack: ${p.attackCooldown.toFixed(1)}`);
                    if (p.dashCooldown > 0) texts.push(`Dash: ${p.dashCooldown.toFixed(1)}`);
                    if (p.reflectCooldown > 0) texts.push(`Reflect: ${p.reflectCooldown.toFixed(1)}`);

                    for (let i = 0; i < texts.length; i++) {
                        ctx.fillText(texts[i], p.x, p.y + p.radius + 20 + i * 14);
                    }
                    ctx.restore();
                }

                if (p.isCharging && id === myRole && !p.isDashing) {
                    const minCharge = globalConfig ? globalConfig.minChargeTime : 0.15;
                    if (p.chargeTime >= minCharge) {
                        ctx.beginPath();
                        let dx = inputState.mouseX - p.x;
                        let dy = inputState.mouseY - p.y;
                        let dist = Math.hypot(dx, dy) || 1;
                        ctx.moveTo(p.x + (dx / dist) * p.radius, p.y + (dy / dist) * p.radius);
                        ctx.lineTo(p.x + (dx / dist) * 100, p.y + (dy / dist) * 100);
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                }
            }

            if (gameState.projectiles) {
                gameState.projectiles.forEach(proj => {
                    ctx.beginPath();
                    ctx.arc(proj.x, proj.y, proj.radius, 0, Math.PI * 2);
                    ctx.fillStyle = proj.color;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.moveTo(proj.x, proj.y);
                    ctx.lineTo(proj.x - proj.vx * 0.06, proj.y - proj.vy * 0.06);
                    ctx.strokeStyle = proj.color;
                    ctx.lineWidth = proj.radius * 1.5;
                    ctx.lineCap = 'round';
                    ctx.globalAlpha = 0.4;
                    ctx.stroke();
                    ctx.globalAlpha = 1.0;
                });
            }

            requestAnimationFrame(draw);
        }

        connect();
        requestAnimationFrame(draw);
    </script>
</body>

</html>
